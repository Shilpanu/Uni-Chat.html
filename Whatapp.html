<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>📎 Unified Share | Real Chat with Files, Images & Videos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Inter', 'Roboto', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #1a2639 0%, #0d1b2a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .chat-app {
            max-width: 1200px;
            width: 100%;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.1);
            overflow: hidden;
            transition: all 0.2s ease;
        }

        /* Modal overlay */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .name-card {
            background: #1e2a3e;
            padding: 2rem;
            border-radius: 2.5rem;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: fadeSlideUp 0.3s ease;
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .name-card h2 { color: #f0f3f8; margin-bottom: 0.75rem; }
        .name-card p { color: #a0b3d9; margin-bottom: 1.8rem; font-size: 0.9rem; }
        .name-card input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 60px;
            border: none;
            background: #0f1722;
            color: white;
            font-size: 1rem;
            outline: none;
            margin-bottom: 1.5rem;
            border: 1px solid #334155;
        }
        .name-card input:focus { border-color: #3b82f6; }
        .name-card button {
            background: #3b82f6;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }
        .name-card button:hover { background: #2563eb; transform: scale(0.98); }

        .chat-header {
            background: rgba(15, 25, 35, 0.9);
            padding: 1rem 1.8rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .brand { display: flex; align-items: center; gap: 10px; }
        .brand h1 {
            font-size: 1.5rem;
            background: linear-gradient(135deg, #e0e7ff, #93c5fd);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .online-badge {
            background: #10b98120;
            padding: 6px 14px;
            border-radius: 60px;
            font-size: 0.8rem;
            color: #a7f3d0;
            border: 1px solid #34d39940;
        }
        .user-info {
            background: #11182780;
            padding: 5px 16px;
            border-radius: 60px;
            font-size: 0.9rem;
            color: #cbd5e6;
        }

        /* messages */
        .messages-container {
            height: 460px;
            overflow-y: auto;
            padding: 1.2rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 14px;
            background: #0f172a30;
            scroll-behavior: smooth;
        }
        .message {
            display: flex;
            flex-direction: column;
            max-width: 80%;
            animation: messagePop 0.2s ease;
        }
        .message.own { align-self: flex-end; align-items: flex-end; }
        .message-bubble {
            padding: 10px 16px;
            border-radius: 24px;
            word-wrap: break-word;
            background: #1e293b;
            color: #e2e8f0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .message.own .message-bubble {
            background: #3b82f6;
            color: white;
            border-bottom-right-radius: 6px;
        }
        .message-meta {
            font-size: 0.7rem;
            margin: 4px 8px 2px;
            color: #94a3b8;
            display: flex;
            gap: 8px;
        }
        .message.own .message-meta { justify-content: flex-end; }
        .sender-name { font-weight: 600; color: #cbd5e1; }
        .timestamp { font-size: 0.65rem; }

        /* Media styles */
        .media-preview {
            max-width: 260px;
            max-height: 200px;
            border-radius: 16px;
            margin-top: 6px;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .file-attachment {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0,0,0,0.3);
            padding: 8px 12px;
            border-radius: 32px;
            text-decoration: none;
            color: #90cdf4;
            font-size: 0.85rem;
        }
        .file-attachment:hover { background: #334155; }
        .message-text { margin-bottom: 6px; }
        
        /* ONE SINGLE BUTTON INPUT AREA */
        .input-area {
            padding: 1rem 1.5rem 1.5rem;
            background: #0f172a60;
            border-top: 1px solid #33415560;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        .input-wrapper {
            flex: 1;
            display: flex;
            gap: 10px;
            align-items: center;
            background: #0f1722;
            border-radius: 60px;
            border: 1px solid #334155;
            padding: 4px 4px 4px 18px;
            transition: 0.2s;
        }
        .input-wrapper:focus-within {
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }
        .input-wrapper input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 0;
            color: white;
            font-size: 1rem;
            outline: none;
        }
        /* Single attachment button */
        .attach-btn {
            background: #334155;
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.4rem;
            transition: 0.2s;
            color: #cbd5e6;
        }
        .attach-btn:hover {
            background: #3b82f6;
            color: white;
            transform: scale(0.96);
        }
        .send-btn {
            background: #3b82f6;
            border: none;
            padding: 0 24px;
            height: 50px;
            border-radius: 60px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.95rem;
        }
        .send-btn:hover {
            background: #2563eb;
            transform: scale(0.96);
        }
        .empty-msg { text-align: center; color: #6c86a3; padding: 40px; font-style: italic; }
        .messages-container::-webkit-scrollbar { width: 6px; }
        .messages-container::-webkit-scrollbar-track { background: #0f172a; border-radius: 10px; }
        .messages-container::-webkit-scrollbar-thumb { background: #3b82f660; border-radius: 10px; }
        
        @media (max-width: 550px) {
            .message { max-width: 95%; }
            .input-area { flex-direction: column; }
            .input-wrapper { width: 100%; }
            .send-btn { width: 100%; }
        }
    </style>
</head>
<body>

<div class="chat-app" id="chatApp" style="display: none;">
    <div class="chat-header">
        <div class="brand">
            <h1>📎 UniChat</h1>
            <div class="online-badge">● LIVE</div>
        </div>
        <div class="user-info" id="currentUserName">👤 You: --</div>
    </div>
    <div class="messages-container" id="messagesContainer">
        <div class="empty-msg">✨ Share images, videos, docs — one attach button ✨</div>
    </div>
    <div class="input-area">
        <div class="input-wrapper">
            <input type="text" id="messageInput" placeholder="Message or caption..." autocomplete="off">
            <!-- SINGLE ATTACH BUTTON (hidden file input) -->
            <button class="attach-btn" id="singleAttachBtn" title="Attach image, video or document">📎</button>
            <input type="file" id="universalFileInput" style="display: none;" accept="image/*,video/*,.pdf,.txt,.doc,.docx,.xlsx,.ppt,.zip,application/octet-stream">
        </div>
        <button class="send-btn" id="sendBtn">Send</button>
    </div>
</div>

<script>
    // ---------- IndexedDB Setup ----------
    const DB_NAME = 'UniChatMediaDB';
    const STORE_NAME = 'unified_messages';
    const DB_VERSION = 4;
    let db = null;
    let currentUser = null;
    let lastProcessedId = 0;
    let pollingInterval = null;
    let pendingFile = null;       // Store file before sending with optional text

    // Open DB
    function openDB() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open(DB_NAME, DB_VERSION);
            request.onerror = (e) => reject('IndexedDB error: ' + e.target.error);
            request.onsuccess = (e) => {
                db = e.target.result;
                resolve(db);
            };
            request.onupgradeneeded = (e) => {
                const dbRef = e.target.result;
                if (!dbRef.objectStoreNames.contains(STORE_NAME)) {
                    const store = dbRef.createObjectStore(STORE_NAME, { keyPath: 'id', autoIncrement: true });
                    store.createIndex('timestamp', 'timestamp');
                    console.log('✅ Media store ready');
                }
            };
        });
    }

    // Add message to DB (supports media & text)
    async function addMessageToDB(messageObj) {
        if (!db) await openDB();
        return new Promise((resolve, reject) => {
            const transaction = db.transaction([STORE_NAME], 'readwrite');
            const store = transaction.objectStore(STORE_NAME);
            const request = store.add(messageObj);
            request.onsuccess = () => resolve(request.result);
            request.onerror = (err) => reject(err);
        });
    }

    async function getAllMessagesFromDB() {
        if (!db) await openDB();
        return new Promise((resolve, reject) => {
            const transaction = db.transaction([STORE_NAME], 'readonly');
            const store = transaction.objectStore(STORE_NAME);
            const request = store.getAll();
            request.onsuccess = () => {
                let messages = request.result || [];
                messages.sort((a,b) => a.id - b.id);
                resolve(messages);
            };
            request.onerror = (err) => reject(err);
        });
    }

    async function getLatestMessageId() {
        const all = await getAllMessagesFromDB();
        if (!all.length) return 0;
        return Math.max(...all.map(m => m.id));
    }

    // Convert file to base64 for persistent storage
    function fileToBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.onerror = reject;
            reader.readAsDataURL(file);
        });
    }

    // Core send: either text only, or text + pending file, or file only
    async function sendUnifiedMessage(captionText) {
        const text = (captionText || "").trim();
        const hasFile = !!pendingFile;
        
        if (!hasFile && text === "") {
            // Nothing to send
            return false;
        }
        
        try {
            let mediaData = null;
            let mediaType = null;
            let fileName = null;
            let fileSize = null;
            let mimeType = null;
            
            if (hasFile && pendingFile) {
                const file = pendingFile;
                const base64 = await fileToBase64(file);
                mediaData = base64;
                // determine media type category
                if (file.type.startsWith('image/')) mediaType = 'image';
                else if (file.type.startsWith('video/')) mediaType = 'video';
                else mediaType = 'document';
                fileName = file.name;
                fileSize = file.size;
                mimeType = file.type;
            }
            
            // final text: if user typed a caption, use it; otherwise generate default for file
            let finalText = text;
            if (hasFile && finalText === "") {
                if (mediaType === 'image') finalText = "📷 Image";
                else if (mediaType === 'video') finalText = "🎥 Video";
                else finalText = `📎 ${fileName}`;
            }
            
            const messageObj = {
                sender: currentUser,
                text: finalText,
                mediaData: mediaData,
                mediaType: mediaType,
                fileName: fileName,
                fileSize: fileSize,
                mimeType: mimeType,
                timestamp: Date.now()
            };
            
            await addMessageToDB(messageObj);
            await renderAllMessages();
            const latestId = await getLatestMessageId();
            lastProcessedId = latestId;
            
            // Clear pending file after successful send
            pendingFile = null;
            return true;
        } catch (err) {
            console.error("Send error:", err);
            return false;
        }
    }
    
    // Send text only (no file)
    async function sendTextOnly(text) {
        if (!text.trim()) return false;
        return sendUnifiedMessage(text); // pendingFile is null
    }
    
    // Render messages (media + text)
    async function renderAllMessages() {
        const container = document.getElementById('messagesContainer');
        if (!container) return;
        const messages = await getAllMessagesFromDB();
        if (!messages.length) {
            container.innerHTML = `<div class="empty-msg">💬 No messages yet. Use 📎 to attach images/videos/docs!</div>`;
            return;
        }
        container.innerHTML = '';
        messages.forEach(msg => {
            const msgDiv = createMessageElement(msg);
            container.appendChild(msgDiv);
        });
        container.scrollTop = container.scrollHeight;
    }
    
    function createMessageElement(msg) {
        const isOwn = (currentUser && msg.sender === currentUser);
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${isOwn ? 'own' : ''}`;
        
        const bubble = document.createElement('div');
        bubble.className = 'message-bubble';
        
        // text part
        if (msg.text && msg.text.trim() !== "") {
            const textSpan = document.createElement('div');
            textSpan.className = 'message-text';
            textSpan.textContent = msg.text;
            bubble.appendChild(textSpan);
        }
        
        // media part
        if (msg.mediaData) {
            if (msg.mediaType === 'image') {
                const img = document.createElement('img');
                img.src = msg.mediaData;
                img.className = 'media-preview';
                img.style.maxWidth = '260px';
                img.style.borderRadius = '16px';
                img.style.cursor = 'pointer';
                img.onclick = () => window.open(msg.mediaData, '_blank');
                bubble.appendChild(img);
            } 
            else if (msg.mediaType === 'video') {
                const video = document.createElement('video');
                video.src = msg.mediaData;
                video.className = 'media-preview';
                video.controls = true;
                video.style.maxWidth = '260px';
                video.style.borderRadius = '16px';
                bubble.appendChild(video);
            }
            else {
                // document or any other file
                const linkDiv = document.createElement('div');
                linkDiv.className = 'file-attachment';
                const icon = '📄';
                const sizeStr = msg.fileSize ? ` (${(msg.fileSize/1024).toFixed(1)} KB)` : '';
                linkDiv.innerHTML = `${icon} ${escapeHtml(msg.fileName || 'file')}${sizeStr} ⬇️`;
                const downloadLink = document.createElement('a');
                downloadLink.href = msg.mediaData;
                downloadLink.download = msg.fileName || 'download';
                downloadLink.style.textDecoration = 'none';
                downloadLink.appendChild(linkDiv);
                bubble.appendChild(downloadLink);
            }
        }
        
        const meta = document.createElement('div');
        meta.className = 'message-meta';
        const nameSpan = document.createElement('span');
        nameSpan.className = 'sender-name';
        nameSpan.textContent = msg.sender;
        const timeSpan = document.createElement('span');
        timeSpan.className = 'timestamp';
        const formattedTime = new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute:'2-digit' });
        timeSpan.textContent = formattedTime;
        meta.appendChild(nameSpan);
        meta.appendChild(timeSpan);
        
        messageDiv.appendChild(bubble);
        messageDiv.appendChild(meta);
        return messageDiv;
    }
    
    // Polling across tabs
    async function pollNewMessages() {
        if (!currentUser) return;
        try {
            const currentMaxId = await getLatestMessageId();
            if (currentMaxId > lastProcessedId) {
                await renderAllMessages();
                lastProcessedId = currentMaxId;
            }
        } catch(e) { console.warn(e); }
    }
    
    function startRealtimeSync() {
        if (pollingInterval) clearInterval(pollingInterval);
        pollingInterval = setInterval(() => pollNewMessages(), 400);
    }
    
    // SINGLE FILE ATTACH LOGIC: using one universal button
    function setupSingleAttach() {
        const attachBtn = document.getElementById('singleAttachBtn');
        const fileInput = document.getElementById('universalFileInput');
        
        attachBtn.addEventListener('click', () => {
            fileInput.click();
        });
        
        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            // Store the file temporarily
            pendingFile = file;
            
            // Show a small visual feedback on attach button (optional)
            attachBtn.style.background = "#3b82f6";
            attachBtn.style.color = "white";
            setTimeout(() => {
                if (attachBtn) attachBtn.style.background = "#334155";
            }, 300);
            
            // Optionally: put a filename hint in the input placeholder
            const msgInput = document.getElementById('messageInput');
            const originalPlaceholder = msgInput.placeholder;
            msgInput.placeholder = `📎 Ready: ${file.name} (add caption or press Send)`;
            msgInput.focus();
            
            // Auto reset placeholder after blur or send? we'll reset after send or later
            const resetPlaceholder = () => {
                msgInput.placeholder = "Message or caption...";
                msgInput.removeEventListener('blur', resetPlaceholder);
            };
            msgInput.addEventListener('blur', resetPlaceholder, { once: true });
            
            // Clear input value so user doesn't think file is separate? Keep text field for caption
            fileInput.value = ''; // allow re-upload same file
        });
    }
    
    // Send logic: if there's a pending file, send as media+text; else send plain text
    async function handleSend() {
        const msgInput = document.getElementById('messageInput');
        const rawText = msgInput.value;
        
        if (pendingFile) {
            // send with file + optional caption
            const success = await sendUnifiedMessage(rawText);
            if (success) {
                msgInput.value = "";
                pendingFile = null;
                // reset placeholder
                msgInput.placeholder = "Message or caption...";
                const attachBtn = document.getElementById('singleAttachBtn');
                if (attachBtn) attachBtn.style.background = "#334155";
            } else {
                alert("Failed to send media. Try again.");
            }
        } else {
            // text only
            if (rawText.trim() !== "") {
                const success = await sendTextOnly(rawText);
                if (success) {
                    msgInput.value = "";
                }
            } else {
                // nothing to send
                if (!pendingFile) {
                    // subtle hint
                    msgInput.placeholder = "Type a message or attach file 📎";
                    setTimeout(() => {
                        if (msgInput) msgInput.placeholder = "Message or caption...";
                    }, 1500);
                }
            }
        }
        // focus again
        msgInput.focus();
    }
    
    // Initialize after name
    async function initChatAfterName(userName) {
        currentUser = userName;
        sessionStorage.setItem('chatUserName', userName);
        await openDB();
        const maxId = await getLatestMessageId();
        lastProcessedId = maxId;
        await renderAllMessages();
        document.getElementById('chatApp').style.display = 'block';
        document.getElementById('currentUserName').innerHTML = `👤 ${escapeHtml(userName)}`;
        document.getElementById('messageInput').focus();
        startRealtimeSync();
        setupSingleAttach();    // single attach button logic
        bindChatEvents();
    }
    
    function bindChatEvents() {
        const sendBtn = document.getElementById('sendBtn');
        const msgInput = document.getElementById('messageInput');
        
        sendBtn.addEventListener('click', handleSend);
        msgInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                handleSend();
            }
        });
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // Name entry modal
    function showNameModal() {
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.id = 'nameModal';
        modal.innerHTML = `
            <div class="name-card">
                <h2>📎 Join & Share</h2>
                <p>Enter your name to chat & send any file (image, video, document)</p>
                <input type="text" id="usernameInput" placeholder="e.g., Taylor, Morgan..." maxlength="24" autocomplete="off">
                <button id="enterChatBtn">🚀 Enter Chat</button>
            </div>
        `;
        document.body.appendChild(modal);
        const inputField = modal.querySelector('#usernameInput');
        const enterBtn = modal.querySelector('#enterChatBtn');
        
        const joinHandler = () => {
            let rawName = inputField.value.trim();
            if (!rawName) { alert("Please enter a name to join!"); return; }
            let finalName = escapeHtml(rawName).substring(0, 24);
            if (!finalName) finalName = "Guest";
            modal.remove();
            initChatAfterName(finalName).catch(err => {
                console.error(err);
                alert("Failed to start chat. Refresh the page.");
            });
        };
        enterBtn.addEventListener('click', joinHandler);
        inputField.addEventListener('keypress', (e) => { if (e.key === 'Enter') joinHandler(); });
    }
    
    window.addEventListener('load', () => {
        showNameModal();
    });
    
    window.addEventListener('beforeunload', () => {
        if (pollingInterval) clearInterval(pollingInterval);
    });
    
    window.addEventListener('focus', () => {
        if (currentUser) pollNewMessages();
    });
</script>
</body>
</html>
